<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - GIVE</title>
  <link rel="stylesheet" href="style/styles.css">
</head>
<body class="login-body">

  <div class="login-container">
    <!-- Logo -->
    <div class="text-center mb-8">
      <h1 class="logo"> <div class="logo"><img src="style/logo2.png" alt="GIVE logo"" class="logo-img" />
        
      </div></h1>
      <p class="tagline">Volunteer for a Better Tomorrow</p>
    </div>

    <h2 class="text-center text-2xl font-semibold mb-6">Welcome Back</h2>

    <!-- Role Selection -->
    <div class="role-selector">
      <button class="role-btn active" data-role="volunteer">Volunteer</button>
      <button class="role-btn" data-role="nonprofit">Non-Profit</button>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>

      <div class="flex items-center justify-between mb-6 text-sm">
        <label class="flex items-center gap-2">
          <input type="checkbox" id="remember">
          <span>Remember me</span>
        </label>
        <a href="#" class="text-teal-600 hover:underline">Forgot Password?</a>
      </div>

      <button type="submit" class="btn-primary w-full py-3 text-lg">
        Log In as <span id="selected-role">Volunteer</span>
      </button>
    </form>

    <p class="text-center mt-6 text-gray-600">
      Don't have an account? 
      <a href="signup.html" class="text-teal-600 font-medium hover:underline">Sign Up</a>
    </p>
  </div>

  <script>
    // Role Selection Logic
    const roleBtns = document.querySelectorAll('.role-btn');
    const selectedRoleText = document.getElementById('selected-role');

    roleBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        roleBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedRoleText.textContent = btn.textContent;
      });
    });
  </script>

</body>
</html>
